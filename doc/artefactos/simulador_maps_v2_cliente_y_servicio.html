
<h2 class="sr-only">Simulador v2 de flujo conversacional con integración Maps para registro de cliente y carga de servicio</h2>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#chat-container {
  max-width: 420px;
  margin: 0 auto;
  font-family: var(--font-sans);
  background: var(--color-background-secondary);
  border-radius: var(--border-radius-lg);
  overflow: hidden;
  border: 0.5px solid var(--color-border-tertiary);
}
#chat-header {
  background: #075E54;
  color: #fff;
  padding: 12px 16px;
  font-size: 15px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
}
#chat-header .avatar {
  width: 36px; height: 36px; border-radius: 50%; background: #128C7E;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
#mode-tabs {
  display: flex;
  border-bottom: 0.5px solid var(--color-border-tertiary);
  background: var(--color-background-primary);
}
#mode-tabs button {
  flex: 1; padding: 10px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 500;
  background: var(--color-background-primary);
  color: var(--color-text-secondary);
  border-bottom: 2px solid transparent;
}
#mode-tabs button.active {
  color: #075E54;
  border-bottom-color: #075E54;
}
#chat-messages {
  padding: 12px;
  min-height: 340px;
  max-height: 440px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.msg {
  max-width: 85%;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-wrap: break-word;
}
.msg.bot {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  align-self: flex-start;
  border-top-left-radius: 2px;
}
.msg.user {
  background: #DCF8C6;
  color: #111;
  align-self: flex-end;
  border-top-right-radius: 2px;
}
.msg.system {
  background: var(--color-background-info);
  border: 0.5px solid var(--color-border-info);
  align-self: center;
  font-size: 11px;
  color: var(--color-text-info);
  border-radius: 12px;
  padding: 4px 14px;
}
#input-area {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  border-top: 0.5px solid var(--color-border-tertiary);
  background: var(--color-background-primary);
}
#input-area input {
  flex: 1;
  font-size: 13px;
  padding: 8px 12px;
  border-radius: 20px;
  border: 0.5px solid var(--color-border-secondary);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  outline: none;
}
#input-area button {
  background: #075E54;
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 36px; height: 36px;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
#input-area button:hover { background: #128C7E; }
.typing { font-size: 12px; color: var(--color-text-tertiary); padding: 4px 12px; align-self: flex-start; }
#options-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 0 12px 10px;
}
#options-bar button {
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 16px;
  border: 0.5px solid var(--color-border-secondary);
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  cursor: pointer;
}
#options-bar button:hover { background: var(--color-background-secondary); }
.maps-result {
  background: var(--color-background-info);
  border: 0.5px solid var(--color-border-info);
  border-radius: 6px;
  padding: 6px 10px;
  margin: 2px 0;
  font-size: 12px;
  color: var(--color-text-info);
}
.json-preview {
  background: var(--color-background-tertiary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: 6px;
  padding: 8px 10px;
  margin-top: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.4;
  color: var(--color-text-secondary);
  white-space: pre;
  overflow-x: auto;
}
</style>

<div id="chat-container">
  <div id="chat-header">
    <div class="avatar">B</div>
    <div>
      <div>Bot Farmacia</div>
      <div style="font-size:11px;opacity:0.8">en linea</div>
    </div>
  </div>
  <div id="mode-tabs">
    <button class="active" onclick="switchMode('cliente')">Registro cliente</button>
    <button onclick="switchMode('auxilio')">Carga servicio</button>
  </div>
  <div id="chat-messages"></div>
  <div id="options-bar"></div>
  <div id="input-area">
    <input type="text" id="user-input" placeholder="Escribi un mensaje..." />
    <button id="send-btn">&#9654;</button>
  </div>
</div>

<script>
const msgs = document.getElementById('chat-messages');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const optBar = document.getElementById('options-bar');
const tabs = document.querySelectorAll('#mode-tabs button');

let mode = 'cliente';
let step = 0;
let datos = {};
let mapsResults = [];
let reintentos = 0;

const MAPS_DB = {
  "corrientes 1234 caba": [
    { fmt: "Av. Corrientes 1234, CABA, Buenos Aires", lat: -34.6037, lng: -58.3816, calle: "Av. Corrientes", altura: "1234", loc: "CABA", prov: "Buenos Aires", cp: "C1043", pid: "ChIJ_abc123", pc: null },
  ],
  "rivadavia 5000 caballito": [
    { fmt: "Av. Rivadavia 5000, Caballito, CABA", lat: -34.6186, lng: -58.4358, calle: "Av. Rivadavia", altura: "5000", loc: "Caballito", prov: "Buenos Aires", cp: "C1424", pid: "ChIJ_def456", pc: null },
  ],
  "san martin 800 quilmes": [
    { fmt: "San Martin 800, Quilmes, Buenos Aires", lat: -34.7205, lng: -58.2553, calle: "San Martin", altura: "800", loc: "Quilmes", prov: "Buenos Aires", cp: "B1878", pid: "ChIJ_ghi789", pc: null },
  ]
};

const COORD_REGEX = /^-?\d{1,3}\.\d+,?\s*-?\d{1,3}\.\d+$/;

function addMsg(text, type) {
  const d = document.createElement('div');
  d.className = 'msg ' + type;
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function addHtml(html, type) {
  const d = document.createElement('div');
  d.className = 'msg ' + type;
  d.innerHTML = html;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function addMapsResults(results) {
  let html = '<div style="font-size:13px;margin-bottom:6px">📍 Seleccioná tu dirección:</div>';
  results.forEach((r, i) => {
    html += '<div class="maps-result">' + (i+1) + '. ' + r.fmt + '</div>';
  });
  html += '<div style="font-size:11px;color:var(--color-text-secondary);margin-top:6px">Ingresá el número o escribí otra dirección</div>';
  addHtml(html, 'bot');
}

function addJsonPreview(label, obj) {
  let html = '<div style="font-size:12px;margin-bottom:4px;font-weight:500">' + label + '</div>';
  html += '<div class="json-preview">' + JSON.stringify(obj, null, 2) + '</div>';
  addHtml(html, 'bot');
}

function setOptions(opts) {
  optBar.innerHTML = '';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.textContent = o;
    b.onclick = () => handleInput(o);
    optBar.appendChild(b);
  });
}

function clearOptions() { optBar.innerHTML = ''; }

function showTyping() {
  return new Promise(resolve => {
    const t = document.createElement('div');
    t.className = 'typing';
    t.textContent = 'escribiendo...';
    msgs.appendChild(t);
    msgs.scrollTop = msgs.scrollHeight;
    setTimeout(() => { t.remove(); resolve(); }, 500);
  });
}

async function botSay(text, opts) {
  await showTyping();
  addMsg(text, 'bot');
  if (opts) setOptions(opts);
  else clearOptions();
}

function switchMode(m) {
  mode = m;
  step = 0;
  datos = {};
  mapsResults = [];
  reintentos = 0;
  msgs.innerHTML = '';
  clearOptions();
  tabs.forEach(t => t.classList.remove('active'));
  tabs[m === 'cliente' ? 0 : 1].classList.add('active');
  startFlow();
}

function detectInputType(text) {
  let t = text.trim();
  if (t.includes('maps.app.goo.gl') || t.includes('google.com/maps')) return 'link';
  if (COORD_REGEX.test(t.replace(/\s/g, ''))) return 'coordenadas';
  return 'texto';
}

function searchMaps(query) {
  let q = query.toLowerCase().trim();
  for (let key in MAPS_DB) {
    if (q.includes(key) || key.includes(q)) return MAPS_DB[key];
  }
  if (q.length >= 8) {
    let parts = q.split(/\s+/);
    let calle = parts.slice(0, -2).join(' ') || parts[0];
    let altura = parts[parts.length - 2] || '';
    let loc = parts[parts.length - 1] || '';
    return [
      { fmt: calle.charAt(0).toUpperCase() + calle.slice(1) + ' ' + altura + ', ' + loc.charAt(0).toUpperCase() + loc.slice(1) + ', Buenos Aires', lat: -34.60 + Math.random()*0.1, lng: -58.40 + Math.random()*0.1, calle: calle, altura: altura, loc: loc, prov: 'Buenos Aires', cp: 'B1000', pid: 'ChIJ_gen', pc: null }
    ];
  }
  return null;
}

function coordToAddress(text) {
  let nums = text.replace(/\s/g, '').split(',');
  let lat = parseFloat(nums[0]);
  let lng = parseFloat(nums[1]);
  return {
    fmt: 'J8RV+CR3 Dique Luján, Buenos Aires',
    lat: lat, lng: lng,
    calle: null, altura: null, loc: 'Dique Luján', prov: 'Buenos Aires', cp: null,
    pid: null, pc: 'J8RV+CR3'
  };
}

function buildServicioJson(dir) {
  return {
    direccion_formateada: dir.fmt,
    coordenadas: { lat: Math.round(dir.lat*1000000)/1000000, lng: Math.round(dir.lng*1000000)/1000000 },
    place_id: dir.pid,
    componentes: { calle: dir.calle, altura: dir.altura, localidad: dir.loc, provincia: dir.prov, codigo_postal: dir.cp },
    plus_code: dir.pc,
    origen_input: dir._inputType || 'texto'
  };
}

function buildClienteJson(dir) {
  return {
    alias: { valor: '', origen: 'manual' },
    calle: { valor: dir.calle || '', origen: dir.calle ? 'maps' : 'manual' },
    altura: { valor: dir.altura || '', origen: dir.altura ? 'maps' : 'manual' },
    piso: { valor: '', origen: 'manual' },
    depto: { valor: '', origen: 'manual' },
    localidad: { valor: dir.loc || '', origen: dir.loc ? 'maps' : 'manual' },
    codigo_postal: { valor: dir.cp || '', origen: dir.cp ? 'maps' : 'manual' },
    provincia: { valor: dir.prov || '', origen: dir.prov ? 'maps' : 'manual' },
    coordenadas: { lat: Math.round(dir.lat*1000000)/1000000, lng: Math.round(dir.lng*1000000)/1000000 },
    place_id: dir.pid,
    plus_code: dir.pc
  };
}

async function handleInput(text) {
  if (!text.trim()) return;
  addMsg(text, 'user');
  input.value = '';
  clearOptions();

  if (mode === 'cliente') await handleCliente(text);
  else await handleAuxilio(text);
}

async function handleCliente(text) {
  if (step === 0) {
    await botSay("👋 ¡Hola! Para completar tu registro necesitamos tu dirección.\n\n📍 Ingresá calle, altura y localidad:\n(ej: Corrientes 1234 CABA)\n\nTambién podés pegar coordenadas o un link de Google Maps.");
    step = 1;
  } else if (step === 1) {
    let tipo = detectInputType(text);

    if (tipo === 'link') {
      addMsg('Maps: resolviendo link...', 'system');
      await showTyping();
      let dir = coordToAddress('-34.36374,-58.69998');
      dir._inputType = 'link';
      mapsResults = [dir];
      await botSay('📍 Dirección detectada:\n\n' + dir.fmt + '\n\n¿Es correcta? Respondé *si* o escribí otra dirección:', ['si']);
      step = 2;
      return;
    }

    if (tipo === 'coordenadas') {
      addMsg('Maps: geocoding inverso...', 'system');
      await showTyping();
      let dir = coordToAddress(text);
      dir._inputType = 'coordenadas';
      mapsResults = [dir];
      await botSay('📍 Dirección detectada:\n\n' + dir.fmt + '\n\n¿Es correcta? Respondé *si* o escribí otra dirección:', ['si']);
      step = 2;
      return;
    }

    let results = searchMaps(text);
    if (!results) {
      reintentos++;
      if (reintentos >= 3) {
        await botSay('❌ No pudimos encontrar la dirección.\nProbá con calle, entre calles y localidad:\n(ej: Mitre entre Salta y Jujuy, Quilmes)');
        reintentos = 0;
      } else {
        await botSay('❌ No encontramos resultados. Intentá con más detalle\n(calle, altura y localidad):');
      }
      return;
    }

    mapsResults = results;
    if (results.length === 1) {
      await botSay('📍 Dirección encontrada:\n\n' + results[0].fmt + '\n\n¿Es correcta? Respondé *si* o escribí otra dirección:', ['si']);
      step = 2;
    } else {
      addMapsResults(results);
      step = 2;
    }
  } else if (step === 2) {
    let num = parseInt(text);
    let elegida = null;

    if (text.toLowerCase() === 'si' && mapsResults.length >= 1) {
      elegida = mapsResults[0];
    } else if (!isNaN(num) && num >= 1 && num <= mapsResults.length) {
      elegida = mapsResults[num - 1];
    } else {
      step = 1;
      await handleCliente(text);
      return;
    }

    datos.direccion = elegida;
    addMsg('Maps: precargando datos...', 'system');
    await showTyping();

    let precargados = [];
    if (elegida.calle) precargados.push('calle: ' + elegida.calle);
    if (elegida.altura) precargados.push('altura: ' + elegida.altura);
    if (elegida.loc) precargados.push('localidad: ' + elegida.loc);
    if (elegida.prov) precargados.push('provincia: ' + elegida.prov);
    if (elegida.cp) precargados.push('CP: ' + elegida.cp);

    let msg = '✅ Datos precargados por Maps:\n' + precargados.join('\n');
    msg += '\n\nAhora completemos lo que falta.';
    await botSay(msg);
    await botSay('🏠 Ingresá un nombre para esta dirección (ej: Casa, Trabajo):');
    step = 3;
  } else if (step === 3) {
    datos.alias = text.trim();
    if (datos.direccion.calle) {
      await botSay('🏠 Ingresá el piso (o "-" si no aplica):');
      step = 5;
    } else {
      await botSay('🏠 Maps no encontró calle. Ingresá la calle:');
      step = 4;
    }
  } else if (step === 4) {
    datos.calleManual = text.trim();
    await botSay('🏠 Ingresá el piso (o "-" si no aplica):');
    step = 5;
  } else if (step === 5) {
    datos.piso = text.trim();
    await botSay('🏠 Ingresá el departamento (o "-" si no aplica):');
    step = 6;
  } else if (step === 6) {
    datos.depto = text.trim();
    await showTyping();

    let dir = datos.direccion;
    let json = buildClienteJson(dir);
    json.alias.valor = datos.alias;
    json.piso.valor = datos.piso === '-' ? '' : datos.piso;
    json.depto.valor = datos.depto === '-' ? '' : datos.depto;
    if (datos.calleManual) { json.calle.valor = datos.calleManual; json.calle.origen = 'manual'; }

    await botSay('✅ Dirección registrada correctamente.');
    addJsonPreview('JSON guardado en sesiones.json:', json);
    step = 99;
  }
}

let auxStep = 0;
let auxDatos = {};
let auxMapsCtx = '';

async function handleAuxilio(text) {
  if (auxStep === 0) {
    await botSay('🚗 Nuevo servicio de auxilio\n\nIngresá la patente del vehículo:');
    auxStep = 1;
  } else if (auxStep === 1) {
    auxDatos.patente = text.toUpperCase();
    await botSay('Patente: ' + auxDatos.patente + '\n\n📍 Ingresá la dirección de ORIGEN\n(calle, altura y localidad):');
    auxMapsCtx = 'origen';
    auxStep = 2;
    reintentos = 0;
  } else if (auxStep === 2 || auxStep === 4) {
    let tipo = detectInputType(text);
    let num = parseInt(text);

    if (!isNaN(num) && mapsResults.length > 0 && num >= 1 && num <= mapsResults.length) {
      let elegida = mapsResults[num - 1];
      await seleccionarDireccionAuxilio(elegida);
      return;
    }

    if (text.toLowerCase() === 'si' && mapsResults.length >= 1) {
      await seleccionarDireccionAuxilio(mapsResults[0]);
      return;
    }

    if (tipo === 'coordenadas') {
      addMsg('Maps: geocoding inverso...', 'system');
      await showTyping();
      let dir = coordToAddress(text);
      dir._inputType = 'coordenadas';
      mapsResults = [dir];
      await botSay('📍 Dirección detectada:\n\n' + dir.fmt + '\n\n¿Es correcta? Respondé *si* o escribí otra dirección:', ['si']);
      return;
    }

    if (tipo === 'link') {
      addMsg('Maps: resolviendo link...', 'system');
      await showTyping();
      let dir = coordToAddress('-34.36374,-58.69998');
      dir._inputType = 'link';
      mapsResults = [dir];
      await botSay('📍 Dirección detectada:\n\n' + dir.fmt + '\n\n¿Es correcta? Respondé *si* o escribí otra dirección:', ['si']);
      return;
    }

    let results = searchMaps(text);
    if (!results) {
      reintentos++;
      if (reintentos >= 3) {
        await botSay('❌ No pudimos encontrar la dirección.\nProbá con calle, entre calles y localidad:\n(ej: Mitre entre Salta y Jujuy, Quilmes)');
        reintentos = 0;
      } else {
        await botSay('❌ No encontramos resultados. Intentá con más detalle\n(calle, altura y localidad):');
      }
      return;
    }

    mapsResults = results;
    if (results.length === 1) {
      await botSay('📍 Dirección encontrada:\n\n' + results[0].fmt + '\n\n¿Es correcta? Respondé *si* o escribí otra dirección:', ['si']);
    } else {
      addMapsResults(results);
    }
  } else if (auxStep === 5) {
    if (text.toLowerCase() === 'si') {
      await showTyping();
      let km = (Math.random() * 25 + 3).toFixed(1);
      auxDatos.km = km;

      await botSay('✅ Servicio registrado.\n\n🚗 Patente: ' + auxDatos.patente + '\n📍 Origen: ' + auxDatos.origen.fmt + '\n📍 Destino: ' + auxDatos.destino.fmt + '\n📏 Distancia: ' + km + ' km');

      addJsonPreview('JSON origen:', buildServicioJson(auxDatos.origen));
      addJsonPreview('JSON destino:', buildServicioJson(auxDatos.destino));
      auxStep = 99;
    } else {
      await botSay('❌ Servicio cancelado.');
      auxStep = 0;
      auxDatos = {};
    }
  }
}

async function seleccionarDireccionAuxilio(elegida) {
  mapsResults = [];
  reintentos = 0;
  if (auxMapsCtx === 'origen') {
    auxDatos.origen = elegida;
    await botSay('✅ Origen: ' + elegida.fmt + '\n\n📍 Ahora ingresá la dirección de DESTINO\n(calle, altura y localidad):');
    auxMapsCtx = 'destino';
    auxStep = 4;
  } else {
    auxDatos.destino = elegida;
    addMsg('Maps: calculando distancia...', 'system');
    await showTyping();
    let km = (Math.random() * 25 + 3).toFixed(1);
    await botSay('📏 Distancia estimada: ' + km + ' km\n\nOrigen: ' + auxDatos.origen.fmt + '\nDestino: ' + elegida.fmt + '\nPatente: ' + auxDatos.patente + '\n\n¿Confirmás? Respondé *si* o *no*:', ['si', 'no']);
    auxStep = 5;
  }
}

async function startFlow() {
  if (mode === 'cliente') {
    await botSay('Simulador: Registro de dirección del cliente\n\nEscribí "hola" para arrancar', ['hola']);
    step = 0;
  } else {
    await botSay('Simulador: Carga de servicio de auxilio\n\nEscribí "hola" para arrancar', ['hola']);
    auxStep = 0;
    auxDatos = {};
    auxMapsCtx = '';
  }
}

sendBtn.onclick = () => handleInput(input.value);
input.onkeydown = (e) => { if (e.key === 'Enter') handleInput(input.value); };

startFlow();
</script>
